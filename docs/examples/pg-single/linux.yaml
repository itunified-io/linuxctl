kind: Linux
apiVersion: linuxctl.itunified.io/v1alpha1

# Single-node PostgreSQL 16 host prep example.
# Creates the postgres user/group, data directory, sysctl tuning, and
# opens the PG port in the public firewall zone.

users_groups:
  groups:
    - name: postgres
      gid: 5432
  users:
    - name: postgres
      uid: 5432
      gid: postgres
      groups:
        - postgres
      home: /var/lib/postgresql
      shell: /bin/bash

directories:
  - path: /var/lib/postgresql/16/data
    owner: postgres
    group: postgres
    mode: "0700"
    recursive: true
  - path: /var/log/postgresql
    owner: postgres
    group: postgres
    mode: "0755"

packages:
  install:
    - postgresql16
    - postgresql16-server
  enabled_services:
    - postgresql-16

sysctl:
  - key: kernel.shmmax
    value: "17179869184"
  - key: kernel.shmall
    value: "4194304"
  - key: vm.swappiness
    value: "10"
  - key: vm.overcommit_memory
    value: "2"

limits:
  - user: postgres
    type: soft
    item: nofile
    value: "65536"
  - user: postgres
    type: hard
    item: nofile
    value: "65536"
  - user: postgres
    type: soft
    item: nproc
    value: "16384"

firewall:
  enabled: true
  zones:
    public:
      ports:
        - name: postgres
          port: 5432
          proto: tcp

services:
  - name: postgresql-16
    enabled: true
    state: running

hosts_entries:
  - ip: 127.0.0.1
    names:
      - pg01.local
